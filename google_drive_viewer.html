<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Drive Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --surface2: #1c2030;
      --border: rgba(255,255,255,0.07);
      --accent: #4f8cff;
      --accent2: #a78bfa;
      --green: #34d399;
      --text: #e8eaf0;
      --muted: #6b7280;
      --danger: #f87171;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 24px;
      overflow-x: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,140,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,140,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .header-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 24px rgba(79,140,255,0.35);
    }

    .header-icon svg { width: 22px; height: 22px; }

    .header-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header-text p {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s ease-in-out infinite;
      margin-left: auto;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Drop Zone */
    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
      background: var(--surface);
      cursor: pointer;
      transition: all 0.25s ease;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .drop-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(79,140,255,0.06), rgba(167,139,250,0.06));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .drop-zone:hover::before,
    .drop-zone.drag-over::before { opacity: 1; }

    .drop-zone.drag-over {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,140,255,0.15), inset 0 0 40px rgba(79,140,255,0.04);
    }

    .drop-icon {
      width: 48px; height: 48px;
      margin: 0 auto 12px;
      background: var(--surface2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s ease;
      border: 1px solid var(--border);
    }

    .drop-zone.drag-over .drop-icon { transform: translateY(-4px) scale(1.05); }
    .drop-icon svg { width: 22px; height: 22px; color: var(--accent); }

    .drop-zone h3 {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .drop-zone p {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .drop-zone p span {
      color: var(--accent);
      cursor: pointer;
    }

    #fileInput { display: none; }

    /* Upload Queue */
    .upload-queue {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .upload-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .upload-item-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 15px;
    }

    .upload-item-name {
      font-size: 0.78rem;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .upload-item-size {
      font-size: 0.68rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .upload-item-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 2px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .upload-item-remove:hover { color: var(--danger); }
    .upload-item-remove svg { width: 14px; height: 14px; }

    /* Section label */
    .section-label {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* File List */
    #fileList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .file-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      animation: fadeUp 0.3s ease both;
      text-decoration: none;
      color: inherit;
    }

    .file-item:nth-child(1) { animation-delay: 0.03s; }
    .file-item:nth-child(2) { animation-delay: 0.06s; }
    .file-item:nth-child(3) { animation-delay: 0.09s; }
    .file-item:nth-child(4) { animation-delay: 0.12s; }
    .file-item:nth-child(5) { animation-delay: 0.15s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .file-item:hover {
      background: var(--surface2);
      border-color: rgba(79,140,255,0.25);
      transform: translateX(3px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }

    /* File type icon */
    .file-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 0px; /* hide text, we use SVG */
    }

    .file-icon svg { width: 18px; height: 18px; }

    /* Color themes per type */
    .icon-folder { background: rgba(251,191,36,0.12); color: #fbbf24; }
    .icon-image  { background: rgba(52,211,153,0.12); color: #34d399; }
    .icon-pdf    { background: rgba(248,113,113,0.12); color: #f87171; }
    .icon-doc    { background: rgba(79,140,255,0.12);  color: #4f8cff; }
    .icon-sheet  { background: rgba(52,211,153,0.12);  color: #34d399; }
    .icon-slide  { background: rgba(251,146,60,0.12);  color: #fb923c; }
    .icon-video  { background: rgba(167,139,250,0.12); color: #a78bfa; }
    .icon-audio  { background: rgba(251,191,36,0.12);  color: #fbbf24; }
    .icon-zip    { background: rgba(156,163,175,0.12); color: #9ca3af; }
    .icon-code   { background: rgba(52,211,153,0.12);  color: #34d399; }
    .icon-file   { background: rgba(107,114,128,0.1);  color: #6b7280; }

    .file-info { flex: 1; min-width: 0; }

    .file-name {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-meta {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .file-arrow {
      color: var(--muted);
      transition: color 0.2s, transform 0.2s;
      flex-shrink: 0;
    }

    .file-item:hover .file-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .empty-state svg {
      width: 40px; height: 40px;
      margin: 0 auto 12px;
      display: block;
      opacity: 0.3;
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Drive Viewer</h1>
      <p>Google Drive — Live Sync</p>
    </div>
    <div class="status-dot" title="Live polling active"></div>
  </div>

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
      </svg>
    </div>
    <h3>Drop files here</h3>
    <p>Drag &amp; drop to queue files, or <span id="browseBtn">browse</span></p>
    <input type="file" id="fileInput" multiple>
  </div>

  <!-- Upload Queue -->
  <div class="upload-queue" id="uploadQueue"></div>

  <!-- Drive Files -->
  <div class="section-label">Drive Contents</div>
  <ul id="fileList">
    <li class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Connecting to Drive…
    </li>
  </ul>
</div>

<script>
const API_KEY = 'AIzaSyDWC0fqICusytSBgOqFqtQx0EGpVGP5AFY';
const FOLDER_ID = '1ET36NM5uLHZ5OS1ZsVRN3kN0NOaEyvbL';
let lastFileIds = new Set();

// ── Icon helpers ──────────────────────────────────────────────────────────────
function getIconClass(mime) {
  if (mime === 'application/vnd.google-apps.folder') return 'icon-folder';
  if (mime.startsWith('image/')) return 'icon-image';
  if (mime === 'application/pdf') return 'icon-pdf';
  if (mime.includes('spreadsheet') || mime.includes('excel') || mime.includes('csv')) return 'icon-sheet';
  if (mime.includes('presentation') || mime.includes('powerpoint')) return 'icon-slide';
  if (mime.includes('document') || mime.includes('word') || mime.includes('text')) return 'icon-doc';
  if (mime.startsWith('video/')) return 'icon-video';
  if (mime.startsWith('audio/')) return 'icon-audio';
  if (mime.includes('zip') || mime.includes('rar') || mime.includes('tar') || mime.includes('7z')) return 'icon-zip';
  if (mime.includes('javascript') || mime.includes('json') || mime.includes('html') || mime.includes('css') || mime.includes('python') || mime.includes('script')) return 'icon-code';
  return 'icon-file';
}

const ICONS = {
  folder: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>`,
  image:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
  pdf:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>`,
  doc:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>`,
  sheet:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>`,
  slide:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`,
  video:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`,
  audio:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
  zip:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  code:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
  file:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
  arrow:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>`,
};

function getIconSVG(mime) {
  if (mime === 'application/vnd.google-apps.folder') return ICONS.folder;
  if (mime.startsWith('image/')) return ICONS.image;
  if (mime === 'application/pdf') return ICONS.pdf;
  if (mime.includes('spreadsheet') || mime.includes('excel') || mime.includes('csv')) return ICONS.sheet;
  if (mime.includes('presentation') || mime.includes('powerpoint')) return ICONS.slide;
  if (mime.includes('document') || mime.includes('word') || mime.includes('text')) return ICONS.doc;
  if (mime.startsWith('video/')) return ICONS.video;
  if (mime.startsWith('audio/')) return ICONS.audio;
  if (mime.includes('zip') || mime.includes('rar') || mime.includes('tar')) return ICONS.zip;
  if (mime.includes('javascript') || mime.includes('json') || mime.includes('html') || mime.includes('css')) return ICONS.code;
  return ICONS.file;
}

function getTypeName(mime) {
  if (mime === 'application/vnd.google-apps.folder') return 'Folder';
  if (mime.startsWith('image/')) return 'Image';
  if (mime === 'application/pdf') return 'PDF';
  if (mime.includes('spreadsheet') || mime.includes('excel')) return 'Spreadsheet';
  if (mime.includes('presentation') || mime.includes('powerpoint')) return 'Presentation';
  if (mime.includes('document') || mime.includes('word')) return 'Document';
  if (mime.startsWith('video/')) return 'Video';
  if (mime.startsWith('audio/')) return 'Audio';
  if (mime.includes('zip') || mime.includes('rar')) return 'Archive';
  return 'File';
}

// ── Drive fetch ────────────────────────────────────────────────────────────────
async function fetchFiles() {
  try {
    const response = await gapi.client.drive.files.list({
      q: `'${FOLDER_ID}' in parents and trashed = false`,
      fields: 'files(id, name, mimeType, webViewLink, size)',
      orderBy: 'folder,name'
    });

    const files = response.result.files;
    const currentFileIds = new Set(files.map(f => f.id));
    const isChanged = files.length !== lastFileIds.size || [...currentFileIds].some(id => !lastFileIds.has(id));
    if (!isChanged) return;
    lastFileIds = currentFileIds;

    const fileList = document.getElementById('fileList');
    fileList.innerHTML = '';

    if (files.length === 0) {
      fileList.innerHTML = `<li class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        This folder is empty
      </li>`;
      return;
    }

    files.forEach(file => {
      const li = document.createElement('li');
      li.className = 'file-item';
      const iconClass = getIconClass(file.mimeType);
      const iconSVG = getIconSVG(file.mimeType);
      const typeName = getTypeName(file.mimeType);

      li.innerHTML = `
        <div class="file-icon ${iconClass}">${iconSVG}</div>
        <div class="file-info">
          <div class="file-name">${file.name}</div>
          <div class="file-meta">${typeName}</div>
        </div>
        <div class="file-arrow">${ICONS.arrow}</div>
      `;
      li.addEventListener('click', () => window.open(file.webViewLink, '_blank'));
      fileList.appendChild(li);
    });
  } catch (err) {
    console.error('Error fetching files:', err);
  }
}

async function initDriveViewer() {
  gapi.load('client', async () => {
    await gapi.client.init({
      apiKey: API_KEY,
      discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
    });
    await fetchFiles();
    setInterval(fetchFiles, 5000);
  });
}

window.addEventListener('load', initDriveViewer);

// ── Drag & Drop ────────────────────────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const uploadQueue = document.getElementById('uploadQueue');
const browseBtn = document.getElementById('browseBtn');
let queuedFiles = [];

browseBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => addFiles([...e.target.files]));

dropZone.addEventListener('dragenter', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', e => { if (!dropZone.contains(e.relatedTarget)) dropZone.classList.remove('drag-over'); });
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addFiles([...e.dataTransfer.files]);
});

function getLocalIconClass(type) {
  if (type.startsWith('image/')) return 'icon-image';
  if (type === 'application/pdf') return 'icon-pdf';
  if (type.includes('spreadsheet') || type.includes('excel') || type.includes('csv')) return 'icon-sheet';
  if (type.includes('presentation') || type.includes('powerpoint')) return 'icon-slide';
  if (type.includes('document') || type.includes('word') || type.includes('text')) return 'icon-doc';
  if (type.startsWith('video/')) return 'icon-video';
  if (type.startsWith('audio/')) return 'icon-audio';
  if (type.includes('zip') || type.includes('rar')) return 'icon-zip';
  return 'icon-file';
}

function getLocalIconSVG(type) {
  return getIconSVG(type);
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function addFiles(files) {
  files.forEach(file => {
    const id = Date.now() + Math.random();
    queuedFiles.push({ id, file });

    const item = document.createElement('div');
    item.className = 'upload-item';
    item.dataset.id = id;

    const iconClass = getLocalIconClass(file.type);
    const iconSVG = getLocalIconSVG(file.type);

    item.innerHTML = `
      <div class="upload-item-icon ${iconClass}">${iconSVG}</div>
      <span class="upload-item-name" title="${file.name}">${file.name}</span>
      <span class="upload-item-size">${formatSize(file.size)}</span>
      <button class="upload-item-remove" data-id="${id}" title="Remove">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    `;

    item.querySelector('.upload-item-remove').addEventListener('click', () => {
      queuedFiles = queuedFiles.filter(f => f.id !== id);
      item.style.opacity = '0';
      item.style.transform = 'translateX(-8px)';
      item.style.transition = 'all 0.2s';
      setTimeout(() => item.remove(), 200);
    });

    uploadQueue.appendChild(item);
  });
}
</script>
</body>
</html>
